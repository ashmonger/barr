---
- name: Homarr | Create system group
  ansible.builtin.group:
    name: "{{ homarr_user }}"
    system: true

- name: Homarr | Create system user
  ansible.builtin.user:
    name: "{{ homarr_user }}"
    group: "{{ homarr_user }}"
    home: "{{ homarr_data_dir }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: true

- name: Homarr | Create install directory
  ansible.builtin.file:
    path: "{{ homarr_install_dir }}"
    state: directory
    owner: "{{ homarr_user }}"
    group: "{{ homarr_user }}"
    mode: '0750'

- name: Homarr | Check if built app exists
  ansible.builtin.stat:
    path: "{{ homarr_install_dir }}/.next"
  register: homarr_build

- name: Homarr | Get latest release from GitHub
  ansible.builtin.uri:
    url: "https://api.github.com/repos/ajnart/homarr/releases/latest"
    headers:
      Accept: application/vnd.github.v3+json
      Authorization: "{{ 'Bearer ' + github_token if github_token is defined else omit }}"
    return_content: true
  register: homarr_release
  when: not homarr_build.stat.exists

- name: Homarr | Download source archive
  ansible.builtin.get_url:
    url: "{{ homarr_release.json.tarball_url }}"
    dest: /tmp/homarr.tar.gz
    mode: '0644'
  when: not homarr_build.stat.exists

- name: Homarr | Extract source
  ansible.builtin.unarchive:
    src: /tmp/homarr.tar.gz
    dest: "{{ homarr_install_dir }}"
    extra_opts:
      - --strip-components=1
    owner: "{{ homarr_user }}"
    group: "{{ homarr_user }}"
    remote_src: true
  when: not homarr_build.stat.exists

- name: Homarr | Install dependencies
  ansible.builtin.command:
    cmd: yarn install --frozen-lockfile
    chdir: "{{ homarr_install_dir }}"
  become_user: "{{ homarr_user }}"
  when: not homarr_build.stat.exists

- name: Homarr | Build application
  ansible.builtin.command:
    cmd: yarn build
    chdir: "{{ homarr_install_dir }}"
  become_user: "{{ homarr_user }}"
  environment:
    NODE_ENV: production
  when: not homarr_build.stat.exists

- name: Homarr | Install systemd unit
  ansible.builtin.template:
    src: homarr.service.j2
    dest: /etc/systemd/system/homarr.service
    owner: root
    group: root
    mode: '0644'
  notify: systemd daemon-reload

- name: Homarr | Enable and start service
  ansible.builtin.systemd:
    name: homarr
    enabled: true
    state: started
    daemon_reload: true
