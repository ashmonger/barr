---
# Read each app's API key from its config.xml (generated on first boot).
# Results are stored as host facts: prowlarr_api_key, sonarr_api_key, etc.

- name: Read API keys | Slurp config.xml files
  ansible.builtin.slurp:
    src: "{{ item.data_dir }}/config.xml"
  register: _cfg_raw
  loop: "{{ servarr_apps }}"
  loop_control:
    loop_var: item
    label: "{{ item.name }}"

- name: Read API keys | Extract from XML
  ansible.builtin.set_fact:
    "{{ item.item.name | lower }}_api_key": >-
      {{ item.content | b64decode | string
         | regex_findall('<ApiKey>([^<]+)</ApiKey>')
         | first }}
  loop: "{{ _cfg_raw.results }}"
  loop_control:
    loop_var: item
    label: "{{ item.item.name }}"

- name: Read API keys | Wait for Bazarr config.ini
  ansible.builtin.wait_for:
    path: "{{ bazarr_data_dir }}/config.ini"
    state: present
    timeout: 60
  ignore_errors: true
  register: _bazarr_cfg_wait

- name: Read API keys | Slurp Bazarr config.ini
  ansible.builtin.slurp:
    src: "{{ bazarr_data_dir }}/config.ini"
  register: _bazarr_cfg_raw
  when: not (_bazarr_cfg_wait.failed | default(false))
  ignore_errors: true

- name: Read API keys | Extract Bazarr API key
  ansible.builtin.set_fact:
    bazarr_api_key: >-
      {{ _bazarr_cfg_raw.content | b64decode | string
         | regex_findall('(?m)^apikey\s*=\s*(.+)$')
         | first | trim }}
  when: not (_bazarr_cfg_wait.failed | default(false)) and not (_bazarr_cfg_raw.failed | default(false))
