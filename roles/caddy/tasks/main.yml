---
- name: Caddy | Install prerequisites
  ansible.builtin.apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
      - gnupg
    state: present

- name: Caddy | Check if GPG keyring exists
  ansible.builtin.stat:
    path: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  register: _caddy_gpg_keyring

- name: Caddy | Download Caddy GPG key
  ansible.builtin.get_url:
    url: 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key'
    dest: /tmp/caddy-gpg-armored.key
    mode: '0644'
  when: not _caddy_gpg_keyring.stat.exists

- name: Caddy | Dearmor Caddy GPG key
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg /tmp/caddy-gpg-armored.key
    creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg

- name: Caddy | Add Caddy apt repository
  ansible.builtin.get_url:
    url: 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt'
    dest: /etc/apt/sources.list.d/caddy-stable.list
    mode: '0644'

- name: Caddy | Install caddy
  ansible.builtin.apt:
    name: caddy
    state: present
    update_cache: true

- name: Caddy | Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: '0644'
  notify: Caddy | Reload

- name: Caddy | Enable and start service
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
