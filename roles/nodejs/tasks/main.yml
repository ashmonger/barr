---
- name: Node.js | Install gnupg
  ansible.builtin.apt:
    name: gnupg
    state: present

- name: Node.js | Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Node.js | Import NodeSource GPG key
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key \
        | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
    executable: /bin/bash
    creates: /etc/apt/keyrings/nodesource.gpg

- name: Node.js | Add NodeSource apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_22.x nodistro main"
    state: present
    filename: nodesource

- name: Node.js | Install nodejs
  ansible.builtin.apt:
    name:
      - nodejs
    state: present
    update_cache: true

- name: Node.js | Install yarn globally
  ansible.builtin.command:
    cmd: npm install -g yarn
    creates: /usr/local/bin/yarn

- name: Node.js | Install pnpm globally
  ansible.builtin.command:
    cmd: npm install -g pnpm
    creates: /usr/local/bin/pnpm
