---
name: CI

on:
  push:
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        # shellcheck is pre-installed on ubuntu-latest runners
        run: shellcheck barr-vm.sh

  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install --quiet "yamllint>=1.35,<2"

      - name: Run yamllint
        run: yamllint .

  ansible-lint:
    name: Ansible lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint
        # ansible-lint bundles ansible-core; no separate ansible install needed.
        run: pip install "ansible-lint==24.12.2"

      - name: Run ansible-lint
        run: ansible-lint install.yml
