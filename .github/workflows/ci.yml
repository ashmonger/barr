---
name: CI

on:
  push:
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        # shellcheck is pre-installed on ubuntu-latest runners
        run: shellcheck barr-vm.sh

  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install --quiet "yamllint>=1.35,<2"

      - name: Run yamllint
        run: yamllint .

  ansible-lint:
    name: Ansible lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint
        # Use a venv to isolate from the system ansible package on ubuntu-latest.
        run: |
          python3 -m venv /opt/alv
          /opt/alv/bin/pip install --quiet "ansible-lint==24.12.2"

      - name: Run ansible-lint
        run: /opt/alv/bin/ansible-lint install.yml
